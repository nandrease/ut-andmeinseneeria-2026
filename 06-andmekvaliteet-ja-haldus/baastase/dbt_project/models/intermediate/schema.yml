version: 2

models:
  - name: int_product_snapshots
    description: "Puhastatud toodete kuusisud staging kihist. See mudel valmistab snapshotid ette SCD dimensiooni ehitamiseks."
    columns:
      - name: product_snapshot_key
        description: "Tehniline võti kujul product_id:YYYY-MM-DD."
        tests:
          - unique
          - not_null
      - name: snapshot_month
        description: "Kuuseisu kuu algus."
        tests:
          - not_null
      - name: product_id
        description: "Toote äriline tunnus."
        tests:
          - not_null
      - name: product_name
        description: "Toote nimi."
        tests:
          - not_null
      - name: category
        description: "Toote kategooria."
        tests:
          - not_null
      - name: base_price_eur
        description: "Toote baashind snapshotis."
        tests:
          - not_null

  - name: int_store_snapshots
    description: "Puhastatud poodide kuusisud staging kihist. See mudel valmistab snapshotid ette SCD dimensiooni ehitamiseks."
    columns:
      - name: store_snapshot_key
        description: "Tehniline võti kujul store_id:YYYY-MM-DD."
        tests:
          - unique
          - not_null
      - name: snapshot_month
        description: "Kuuseisu kuu algus."
        tests:
          - not_null
      - name: store_id
        description: "Poe äriline tunnus."
        tests:
          - not_null
      - name: store_name
        description: "Poe nimi."
        tests:
          - not_null
      - name: city
        description: "Poe linn."
        tests:
          - not_null
      - name: region
        description: "Poe piirkond."
        tests:
          - not_null

  - name: int_orders_base
    description: "Ühtlustatud tellimuste lähtekuju. Tühjad tekstiväljad on muudetud NULL-ideks."
    columns:
      - name: staging_row_id
        description: "Tehniline ridade tunnus staging kihist."
        tests:
          - unique
          - not_null
      - name: order_date
        description: "Tellimuse kuupäev."
        tests:
          - not_null
      - name: source_updated_at
        description: "Allika uuendamise ajatempel."
        tests:
          - not_null

  - name: dim_products_scd
    description: "Toodete SCD Type 2 dimensioon. Iga rida kirjeldab ühte toote versiooni kehtivusvahemikuga."
    columns:
      - name: product_version_key
        description: "Tooteversiooni tehniline võti."
        tests:
          - unique
          - not_null
      - name: product_id
        description: "Toote äriline tunnus."
        tests:
          - not_null
      - name: valid_from
        description: "Kuupäev, millest alates see versioon kehtib."
        tests:
          - not_null
      - name: valid_to
        description: "Kuupäev, milleni see versioon kehtib."
        tests:
          - not_null

  - name: dim_stores_scd
    description: "Poodide SCD Type 2 dimensioon. Iga rida kirjeldab ühte poe versiooni kehtivusvahemikuga."
    columns:
      - name: store_version_key
        description: "Poeversiooni tehniline võti."
        tests:
          - unique
          - not_null
      - name: store_id
        description: "Poe äriline tunnus."
        tests:
          - not_null
      - name: valid_from
        description: "Kuupäev, millest alates see versioon kehtib."
        tests:
          - not_null
      - name: valid_to
        description: "Kuupäev, milleni see versioon kehtib."
        tests:
          - not_null
