version: 2

models:
  - name: int_users
    description: "Puhastatud kasutajaandmed staging kihist"
    columns:
      - name: user_id
        tests:
          - unique
          - not_null
      - name: uuid
        tests:
          - unique
          - not_null
      - name: first_name
        description: "Eesnimi (PII)"
        meta:
          pii: true
          mask: mask_varchar
      - name: last_name
        description: "Perenimi (PII)"
        meta:
          pii: true
          mask: mask_varchar
      - name: email
        description: "E-posti aadress (PII)"
        meta:
          pii: true
          mask: mask_email
        tests:
          - not_null
      - name: city
        description: "Linn (PII)"
        meta:
          pii: true
          mask: mask_varchar
      - name: state
        description: "Maakond/osariik (PII)"
        meta:
          pii: true
          mask: mask_varchar
      - name: country
        description: "Riik - kasutatakse filtreerimiseks, ei ole PII"
        meta:
          pii: false
      - name: street
        description: "Tanaavaadress (PII, tundlikum kui linn)"
        meta:
          pii: true
          mask: mask_null
      - name: postcode
        description: "Postiindeks (PII)"
        meta:
          pii: true
          mask: mask_null
      - name: registered_date
        description: "Registreerumise kuupaev"
        meta:
          pii: false
          mask: mask_date
      - name: loaded_at
        meta:
          pii: false

  - name: int_posts
    description: "Puhastatud postitused staging kihist"
    columns:
      - name: post_id
        tests:
          - unique
          - not_null
      - name: user_id
        tests:
          - not_null
      - name: title
        meta:
          pii: false
      - name: body
        meta:
          pii: false
      - name: loaded_at
        meta:
          pii: false
