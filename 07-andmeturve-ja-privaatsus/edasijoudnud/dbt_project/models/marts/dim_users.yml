version: 2

models:
  - name: dim_users
    description: "Kasutajate dimensioonitabel"
    columns:
      - name: user_key
        tests: [unique, not_null]
      - name: user_id
        tests: [unique, not_null]
      - name: first_name
        meta: { contains_pii: true }
      - name: last_name
        meta: { contains_pii: true }
      - name: full_name
        meta: { contains_pii: true }
      - name: email
        meta: { contains_pii: true }
      - name: city
        meta: { contains_pii: true }
      - name: country
        meta: { contains_pii: false }
      - name: registered_date
        meta: { contains_pii: false }
