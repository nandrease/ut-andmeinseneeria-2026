version: 2

models:
  - name: dim_users_analyst
    description: >
      Analüütiku vaade: kõik veerud nähtavad, PII maskeeritud.
      first_name/last_name: esimene tähemärk + tärnid.
      email: esimene tähemärk + ***@domeen.
      city: esimene tähemärk + tärnid.
      registered_date: trunkeeritud kuu algusesse.

  - name: dim_users_marketing
    description: >
      Turunduse vaade: PII veerud (first_name, last_name, full_name, email) vaatest väljas.
      SELECT email FROM ... annab 'column does not exist' vea (Stsenaarium A).

  - name: dim_users_regional_base
    description: >
      Regiooni juhi vaade (tabel, mitte vaade - RLS nõuab tabelit).
      Row-Level Security: näha ainult SET app.current_region väärtusele vastavad read.
      Column-Level Security: email veerg on tabelis olemas aga ilma GRANT-ita
      (SELECT email -> 'permission denied for column email') (Stsenaarium B).

  - name: fct_posts_analyst
    description: >
      Analüütiku vaade postitustele: autori_nimi maskeeritud,
      pealkiri ja sisu nähtavad.
