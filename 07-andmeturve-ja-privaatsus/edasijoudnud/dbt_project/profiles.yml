praktikum_07:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'db') }}"
      port: 5432
      user: "{{ env_var('POSTGRES_USER', 'admin') }}"
      pass: "{{ env_var('POSTGRES_PASSWORD', 'admin') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'praktikum') }}"
      schema: public
      threads: 2
